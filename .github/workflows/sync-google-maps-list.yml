name: Sync Google Maps List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Sync Google Maps list
        env:
          GOOGLE_MAPS_LIST_URL: https://maps.app.goo.gl/6kiRLdhaMThJCQia9
        run: npm run sync:maps

      - name: Build generated places
        run: npm run build:places

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/places.snapshot.json generated-places.js
          git diff --cached --quiet || git commit -m "chore: sync google maps places snapshot"
          git push
